<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monte-Master Dictionary</title>
    <!-- นำเข้าไลบรารี CryptoJS สำหรับการถอดรหัส -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --mw-red: #C12026;
            --mw-dark: #333333;
            --paper-bg: #fdfcf7;
            --serif-font: Georgia, "Times New Roman", serif;
            --sans-font: Arial, Helvetica, sans-serif;
            --ai-purple: #8a2be2;
        }

        body { 
            font-family: var(--sans-font); 
            padding: 0; 
            background-color: var(--paper-bg);
            margin: 0;
            color: var(--mw-dark);
        }

        .app-container {
            max-width: 700px;
            margin: auto;
            padding: 20px 40px 40px 40px;
            background: #ffffff;
            min-height: 100vh;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
            position: relative;
        }

        .api-key-container {
            text-align: right;
            margin-bottom: 10px;
            transition: opacity 0.3s ease;
        }
        
        .api-key-container input {
            padding: 6px;
            font-size: 12px;
            width: 200px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: var(--sans-font);
        }

        .header-banner {
            background-color: var(--mw-red);
            color: white;
            text-align: center;
            padding: 15px 10px;
            margin: 0 -40px 30px -40px;
            font-family: var(--serif-font);
            letter-spacing: 1.5px;
            font-weight: bold;
            font-size: 22px;
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--mw-red);
            padding-bottom: 20px;
        }

        input[type="text"] { 
            flex-grow: 1;
            padding: 12px; 
            font-size: 16px; 
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: var(--sans-font);
        }

        input:focus {
            outline: none;
            border-color: var(--mw-red);
        }

        button { 
            padding: 10px 20px; 
            font-size: 16px; 
            cursor: pointer; 
            background-color: var(--mw-red);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }

        button:hover {
            background-color: #a0181e;
        }

        #result { 
            font-family: var(--serif-font);
        }

        .word { 
            font-size: 42px; 
            font-weight: bold; 
            color: black;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .pronunciation-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            padding: 10px 0;
            border-top: 1px solid #eaeaea;
            border-bottom: 1px solid #eaeaea;
            font-family: var(--sans-font);
        }

        .pronounce-box {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
        }

        .phonetic-text {
            color: #555;
            font-family: var(--sans-font);
        }

        .thai-reading {
            color: var(--mw-red);
            font-weight: bold;
            font-family: var(--sans-font);
        }

        .ai-reading {
            color: var(--ai-purple);
            font-weight: bold;
            font-family: var(--sans-font);
        }

        .listen-btn {
            padding: 2px 8px;
            font-size: 12px;
            background-color: #f1f1f1;
            color: var(--mw-dark);
            border: 1px solid #ccc;
            border-radius: 4px;
            font-weight: normal;
        }

        .listen-btn:hover {
            background-color: #e2e2e2;
        }

        .part-of-speech {
            font-style: italic;
            font-weight: bold;
            color: black;
            font-size: 20px;
            margin-top: 25px;
            margin-bottom: 10px;
            display: inline-block;
        }

        .meaning-list {
            padding-left: 20px;
            margin-top: 5px;
            list-style-type: decimal;
        }

        .meaning-list li {
            margin-bottom: 15px;
            line-height: 1.6;
            font-size: 18px;
            color: #111;
        }

        .example { 
            font-style: italic; 
            color: #444; 
            margin-top: 5px;
            display: block;
            font-size: 17px;
        }
        
        .example::before {
            content: "• ";
            color: var(--mw-red);
            font-weight: bold;
        }

        .example strong {
            color: black;
            font-weight: bold;
        }

        .gemini-example {
            font-style: italic;
            color: #333;
            background-color: #f8f5ff;
            padding: 8px 12px;
            border-left: 3px solid var(--ai-purple);
            margin-top: 8px;
            font-size: 17px;
            border-radius: 0 4px 4px 0;
            display: none;
        }

        .gemini-example strong {
            color: var(--ai-purple);
            font-style: normal;
        }
        
        .clickable-word {
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .clickable-word:hover {
            color: var(--mw-red);
            text-decoration: underline;
        }

        .synonyms-container {
            margin-top: 15px;
            font-size: 16px;
            color: #444;
            font-family: var(--sans-font);
        }
        
        .antonyms-container {
            margin-top: 8px;
            font-size: 16px;
            color: #444;
            font-family: var(--sans-font);
        }
        
        .syn-tag {
            color: #007BFF;
            cursor: pointer;
            font-weight: bold;
            margin-right: 8px;
            display: inline-block;
        }
        
        .syn-tag:hover {
            text-decoration: underline;
            color: #0056b3;
        }
        
        .ant-tag {
            color: #DC3545;
            cursor: pointer;
            font-weight: bold;
            margin-right: 8px;
            display: inline-block;
        }
        
        .ant-tag:hover {
            text-decoration: underline;
            color: #a71d2a;
        }

        .thai-search-notice {
            background-color: #fff3cd;
            color: #856404;
            padding: 10px 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            font-family: var(--sans-font);
            font-size: 14px;
            border-left: 4px solid #ffeeba;
        }

        #secret-trigger {
            cursor: default;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="api-key-container" id="apiKeyContainer">
            <input type="password" id="appPassword" placeholder="Enter App Password...">
        </div>

        <div class="header-banner">
            <span id="secret-trigger" ondblclick="toggleSecretMode()">Monte</span>-Master <font color="yellow" face="Arial" style="font-weight: bold;"> Dictionary</font>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Enter an English or Thai word...">
            <button onclick="searchWord()">Search</button>
        </div>
        <div id="result" style="display: none;"></div>
    </div>

    <script>
        const ENCRYPTED_API_KEY = "U2FsdGVkX1+RLbcmhUm4Igyqy0zypXmiu+HZ4Hd5h9rNEPgqAv9BecFpknt/avkXIUoKgv97BNGFg+xs4FixKA==";
        
        let isSecretModeActivated = false;
        const SECRET_RAW_API_KEY = "AIzaSyAuS8NBs8qwB21ts0wxkSWt2TSfVJ0mJ2E";

        // ฟังก์ชันสลับโหมดลับเมื่อดับเบิลคลิก
        function toggleSecretMode() {
            const container = document.getElementById('apiKeyContainer');
            
            if (!isSecretModeActivated) {
                // เปิดโหมดลับ
                isSecretModeActivated = true;
                container.style.opacity = '0';
                setTimeout(() => {
                    container.style.display = 'none';
                }, 300);
                alert("✨ Secret Mode Activated! เชื่อมต่อ Gemini API อัตโนมัติ ✨");
            } else {
                // ปิดโหมดลับและกลับสู่โหมดปกติ
                isSecretModeActivated = false;
                container.style.display = 'block';
                // หน่วงเวลาเล็กน้อยให้ display ทำงานก่อนค่อยปรับ opacity เพื่อให้เห็นแอนิเมชัน
                setTimeout(() => {
                    container.style.opacity = '1';
                }, 10);
                alert("🔒 กลับสู่โหมดปกติ ต้องใช้รหัสผ่าน 🔒");
            }
        }

        function playAudio(audioUrl) {
            const audio = new Audio(audioUrl);
            audio.play();
        }

        function searchFromText(element) {
            const rawText = element.innerText;
            const cleanWord = rawText.replace(/[^a-zA-Z-]/g, '');
            if (cleanWord) {
                document.getElementById('searchInput').value = cleanWord;
                searchWord();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function makeClickable(text, targetWord) {
            if (!text) return '';
            return text.split(' ').map(wordStr => {
                const cleanWord = wordStr.replace(/[^a-zA-Z-]/g, '').toLowerCase();
                const isMatch = cleanWord === targetWord.toLowerCase();
                
                if (isMatch) {
                    return `<strong><span class="clickable-word" onclick="searchFromText(this)">${wordStr}</span></strong>`;
                } else {
                    return `<span class="clickable-word" onclick="searchFromText(this)">${wordStr}</span>`;
                }
            }).join(' ');
        }

        function getDecryptedApiKey() {
            if (isSecretModeActivated) {
                return SECRET_RAW_API_KEY;
            }

            const password = document.getElementById('appPassword').value.trim();
            if (!password) return null;
            try {
                const bytes = CryptoJS.AES.decrypt(ENCRYPTED_API_KEY, password);
                const key = bytes.toString(CryptoJS.enc.Utf8);
                return key ? key : null;
            } catch (error) {
                return null;
            }
        }

        async function fetchThaiPronunciation(word) {
            const el = document.getElementById('thai-pronunciation-text');
            if (!el) return;

            const apiKey = getDecryptedApiKey();
            if (!apiKey) {
                el.innerText = "(ใส่รหัสผ่านเพื่อโหลดคำอ่าน)";
                return;
            }

            el.innerHTML = "✨ <em>กำลังโหลด...</em>";
            const promptText = `Provide the Thai phonetic spelling (คำอ่านภาษาไทย) for the English word "${word}". Return ONLY the Thai word without any punctuation or extra text. For example if the word is "environment" return "เอนไวรอนเมินท"`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }],
                        generationConfig: { temperature: 0.1 }
                    })
                });

                if (!response.ok) throw new Error("API Request Failed");

                const data = await response.json();
                const reading = data.candidates[0].content.parts[0].text.trim();
                el.innerText = reading;
            } catch (error) {
                el.innerText = "(โหลดข้อมูลล้มเหลว)";
            }
        }

        async function fetchGeminiExamples(word, definitionsList) {
            const apiKey = getDecryptedApiKey();
            if (!apiKey) return; 

            definitionsList.forEach(def => {
                const el = document.getElementById(`gemini-ex-${def.mIndex}-${def.dIndex}`);
                if (el) {
                    el.style.display = 'block';
                    el.innerHTML = `✨ <span style="color: #666;">Generating example via Gemini...</span>`;
                }
            });

            const promptDefs = definitionsList.map((d, i) => `${i + 1}. [${d.pos}] ${d.definition}`).join('\n');
            const promptText = `Generate exactly one distinct English example sentence for the word "${word}" for each of the following definitions. Also provide a natural Thai translation for each sentence. Return ONLY a valid JSON array of objects with keys "en" (for the English sentence) and "th" (for the Thai translation) in the exact same order. Do not include any markdown formatting like \`\`\`json.\n\nDefinitions:\n${promptDefs}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }],
                        generationConfig: { temperature: 0.7 }
                    })
                });

                if (!response.ok) throw new Error("API Request Failed");

                const data = await response.json();
                let generatedText = data.candidates[0].content.parts[0].text;
                
                generatedText = generatedText.replace(/```json/g, '').replace(/```/g, '').trim();
                const examplesArray = JSON.parse(generatedText);

                definitionsList.forEach((def, index) => {
                    const el = document.getElementById(`gemini-ex-${def.mIndex}-${def.dIndex}`);
                    if (el && examplesArray[index] && examplesArray[index].en) {
                        const clickableSentence = makeClickable(examplesArray[index].en, word);
                        const thaiTranslation = examplesArray[index].th || "";
                        
                        el.innerHTML = `✨ <strong>Gemini:</strong> "${clickableSentence}"<br><span style="color: #666; font-size: 15px; margin-top: 6px; display: inline-block;">🇹🇭 ${thaiTranslation}</span>`;
                    }
                });

            } catch (error) {
                console.error("Gemini API Error:", error);
                definitionsList.forEach(def => {
                    const el = document.getElementById(`gemini-ex-${def.mIndex}-${def.dIndex}`);
                    if (el) el.innerHTML = `✨ <span style="color: red;">Failed to generate example (Check Password/API Limit)</span>`;
                });
            }
        }

        async function searchWord() {
            const originalInput = document.getElementById('searchInput').value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!originalInput) return;

            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<p>Loading...</p>';

            let targetWord = originalInput;
            const isThai = /[ก-๙]/.test(originalInput);

            try {
                if (isThai) {
                    const thToEnResponse = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=th&tl=en&dt=t&q=${encodeURIComponent(originalInput)}`);
                    if (thToEnResponse.ok) {
                        const thToEnData = await thToEnResponse.json();
                        const translatedText = thToEnData[0][0][0];
                        targetWord = translatedText.trim().split(' ')[0].replace(/[^a-zA-Z-]/g, '').toLowerCase();
                    } else {
                        resultDiv.innerHTML = '<p>ไม่สามารถแปลคำภาษาไทยเป็นภาษาอังกฤษได้</p>';
                        return;
                    }
                }

                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${targetWord}`);
                
                if (!response.ok) {
                    resultDiv.innerHTML = '<p>Word not found. Please try another word.</p>';
                    return;
                }
                
                const data = await response.json();
                const entry = data[0];

                let thaiTranslation = "(ไม่พบคำแปล)";
                try {
                    const translateResponse = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=th&dt=t&q=${targetWord}`);
                    if (translateResponse.ok) {
                        const translateData = await translateResponse.json();
                        thaiTranslation = translateData[0][0][0];
                    }
                } catch (transError) {
                    console.log("Translation API failed" + transError);
                }

                let html = '';

                if (isThai) {
                    html += `<div class="thai-search-notice">
                        🇹🇭 ค้นหาจากภาษาไทย: <strong>${originalInput}</strong> ➔ 🇬🇧 <strong>${targetWord}</strong>
                    </div>`;
                }

                html += `<div class="word">${entry.word}</div>`;

                let ukAudio = '';
                let usAudio = '';
                let ukText = '';
                let usText = '';

                entry.phonetics.forEach(p => {
                    if (p.audio && p.audio.includes('-uk.mp3')) {
                        ukAudio = p.audio;
                        if (p.text) ukText = p.text;
                    }
                    if (p.audio && p.audio.includes('-us.mp3')) {
                        usAudio = p.audio;
                        if (p.text) usText = p.text;
                    }
                });

                if (!ukText && entry.phonetic) ukText = entry.phonetic;
                if (!usText && entry.phonetic) usText = entry.phonetic;

                html += `<div class="pronunciation-container">`;
                
                html += `<div class="pronounce-box">
                    <strong>🇬🇧 UK:</strong> 
                    <span class="phonetic-text">${ukText || '-'}</span>`;
                if (ukAudio) {
                    html += `<button class="listen-btn" onclick="playAudio('${ukAudio}')">🔊 Listen</button>`;
                }
                html += `</div>`;

                html += `<div class="pronounce-box">
                    <strong>🇺🇸 US:</strong> 
                    <span class="phonetic-text">${usText || '-'}</span>`;
                if (usAudio) {
                    html += `<button class="listen-btn" onclick="playAudio('${usAudio}')">🔊 Listen</button>`;
                }
                html += `</div>`;

                html += `<div class="pronounce-box">
                    <strong>🗣️ คำอ่าน:</strong> 
                    <span id="thai-pronunciation-text" class="ai-reading"></span>
                </div>`;

                html += `<div class="pronounce-box">
                    <strong>🇹🇭 แปลไทย:</strong> 
                    <span class="thai-reading">${thaiTranslation}</span>
                </div>`;

                html += `</div>`; 

                const currentWord = entry.word;
                const definitionsForGemini = [];

                entry.meanings.forEach((meaning, mIndex) => {
                    html += `<div class="part-of-speech">${meaning.partOfSpeech}</div>`;
                    html += `<ol class="meaning-list">`;
                    
                    meaning.definitions.forEach((def, dIndex) => {
                        definitionsForGemini.push({
                            definition: def.definition,
                            pos: meaning.partOfSpeech,
                            mIndex: mIndex,
                            dIndex: dIndex
                        });

                        const clickableDef = makeClickable(def.definition, currentWord);
                        html += `<li>`;
                        html += `<div>${clickableDef}</div>`;
                        
                        if (def.example) {
                            const clickableExample = makeClickable(def.example, currentWord);
                            html += `<div class="example">"${clickableExample}"</div>`;
                        }

                        html += `<div id="gemini-ex-${mIndex}-${dIndex}" class="gemini-example"></div>`;
                        
                        html += `</li>`;
                    });
                    
                    html += `</ol>`;

                    if (meaning.synonyms && meaning.synonyms.length > 0) {
                        html += `<div class="synonyms-container"><strong>Synonyms:</strong> `;
                        meaning.synonyms.forEach(syn => {
                            html += `<span class="syn-tag" onclick="document.getElementById('searchInput').value='${syn}'; searchWord(); window.scrollTo({ top: 0, behavior: 'smooth' });">${syn}</span>`;
                        });
                        html += `</div>`;
                    }

                    if (meaning.antonyms && meaning.antonyms.length > 0) {
                        html += `<div class="antonyms-container"><strong>Antonyms:</strong> `;
                        meaning.antonyms.forEach(ant => {
                            html += `<span class="ant-tag" onclick="document.getElementById('searchInput').value='${ant}'; searchWord(); window.scrollTo({ top: 0, behavior: 'smooth' });">${ant}</span>`;
                        });
                        html += `</div>`;
                    }
                });

                resultDiv.innerHTML = html;

                fetchThaiPronunciation(currentWord);
                fetchGeminiExamples(currentWord, definitionsForGemini);
                
            } catch (error) {
                resultDiv.innerHTML = '<p>An error occurred while fetching the data.</p>';
            }
        }

        document.getElementById("searchInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                searchWord();
            }
        });
    </script>
</body>
</html>
